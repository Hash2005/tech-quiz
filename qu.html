let currentQuestionIndex = 0;
let score = 0;

const questionTextEl = document.getElementById("question-text");
const optionsContainerEl = document.getElementById("options-container");
const nextBtn = document.getElementById("next-btn");
const feedbackMsg = document.getElementById("feedback-msg");
const progressBar = document.getElementById("progress-bar");
const currentQNumEl = document.getElementById("current-q-num");
const totalQNumEl = document.getElementById("total-q-num");
const quizSection = document.getElementById("quiz-section");
const resultSection = document.getElementById("result-section");

function initQuiz() {
totalQNumEl.innerText = questions.length;
loadQuestion();
}

function loadQuestion() {
const currentQ = questions[currentQuestionIndex];

questionTextEl.innerText = currentQ.q;
currentQNumEl.innerText = currentQuestionIndex + 1;

const progressPercent = ((currentQuestionIndex) / questions.length) * 100;
progressBar.style.width = `${progressPercent}%`;

// Update ARIA
document.querySelector('.progress-container').setAttribute('aria-valuenow', progressPercent);

optionsContainerEl.innerHTML = "";
nextBtn.style.display = "none";
feedbackMsg.innerText = "";
feedbackMsg.style.color = "inherit";

currentQ.options.forEach((opt, index) => {
const btn = document.createElement("button");
btn.className = "option-btn";
btn.innerText = opt;
btn.setAttribute('aria-label', `الخيار ${index + 1}: ${opt}`);
btn.onclick = () => checkAnswer(index, btn);
optionsContainerEl.appendChild(btn);
});
}

function checkAnswer(selectedIndex, btnElement) {
const currentQ = questions[currentQuestionIndex];
const correctIndex = currentQ.a;
const allOptions = optionsContainerEl.children;

if (selectedIndex === correctIndex) {
btnElement.classList.add("correct");
feedbackMsg.innerText = "✅ إجابة صحيحة! أحسنت.";
feedbackMsg.style.color = "var(--success-color)";

for (let btn of allOptions) {
btn.disabled = true;
if (btn !== btnElement) btn.style.opacity = "0.5";
}

nextBtn.style.display = "inline-block";
score++;
} else {
btnElement.classList.add("wrong");
feedbackMsg.innerText = "❌ إجابة خاطئة، حاول مرة أخرى!";
feedbackMsg.style.color = "var(--error-color)";
}
}

function nextQuestion() {
currentQuestionIndex++;
if (currentQuestionIndex < questions.length) {
loadQuestion();
} else {
showResults();
}
}

function showResults() {
quizSection.style.display = "none";
resultSection.style.display = "block";
progressBar.style.width = "100%";
document.querySelector('.progress-container').setAttribute('aria-valuenow', 100);
}

initQuiz();
</script>
